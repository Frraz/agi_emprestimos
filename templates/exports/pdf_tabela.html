<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<style>
  @page { size: A4 landscape; margin: 1.5cm; }
  body { font-family: Arial, sans-serif; color: #1e293b; font-size: 10px; }
  h1 { font-size: 18px; margin: 0 0 2px; color: #059669; }
  .meta { color: #64748b; font-size: 9px; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f1f5f9; text-align: left; padding: 6px 8px; font-size: 9px;
       text-transform: uppercase; letter-spacing: .03em; color: #475569; border-bottom: 2px solid #cbd5e1; }
  td { padding: 5px 8px; border-bottom: 1px solid #e2e8f0; }
  tr:nth-child(even) td { background: #f8fafc; }
</style>
</head>
<body>
  <h1>AGI Empréstimos — {{ titulo }}</h1>
  <p class="meta">Operador: {{ operador }} · Gerado em {{ hoje|date:"d/m/Y" }} · {{ linhas|length }} registro(s)</p>
  <table>
    <thead>
      <tr>{% for campo in campos %}<th>{{ campo }}</th>{% endfor %}</tr>
    </thead>
    <tbody>
      {% for linha in linhas %}
      <tr>{% for valor in linha %}<td>{{ valor }}</td>{% endfor %}</tr>
      {% empty %}
      <tr><td colspan="{{ campos|length }}">Sem registros.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
