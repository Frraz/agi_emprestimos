services:

  # ── Banco de dados ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - agi_postgres_data:/var/lib/postgresql/data
    networks:
      - agi_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django (Gunicorn) ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agi_web
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - agi_static:/app/staticfiles
      - agi_media:/app/media
      - agi_logs:/app/logs
    networks:
      - agi_internal
    expose:
      - "8000"

  # ── Nginx ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: agi_nginx
    restart: unless-stopped
    ports:
      - "8010:80"   # porta 8010 no host → porta 80 do nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - agi_static:/app/staticfiles:ro
      - agi_media:/app/media:ro
    depends_on:
      - web
    networks:
      - agi_internal

volumes:
  agi_postgres_data:
  agi_static:
  agi_media:
  agi_logs:

networks:
  agi_internal:
    driver: bridge