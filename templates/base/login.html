<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#05070b">
  <title>Acesso — Agi Empréstimos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-display { font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; }

    /* Fundo premium: gradiente escuro + brilho esmeralda + grade sutil */
    .login-bg {
      background:
        radial-gradient(900px 500px at 85% -10%, rgba(16,185,129,.16), transparent 60%),
        radial-gradient(700px 500px at 0% 110%, rgba(5,150,105,.12), transparent 55%),
        linear-gradient(160deg, #070b12 0%, #05070b 55%, #04060a 100%);
    }
    .login-bg::before {
      content:''; position:fixed; inset:0; pointer-events:none; opacity:.5;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
    }

    .glass-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 30px 70px -30px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.06);
      -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px);
    }

    .field-label { font-size:12px; font-weight:600; color:#cbd5e1; margin-bottom:7px; display:block; }
    .field-wrap { position:relative; }
    .field-wrap svg.lead { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:17px; height:17px; color:#64748b; pointer-events:none; transition:color .15s; }
    .input {
      width:100%; padding:12px 14px 12px 40px; font-size:14px; color:#f1f5f9;
      background: rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
      border-radius:12px; outline:none; transition:border-color 150ms, box-shadow 150ms, background 150ms;
    }
    .input::placeholder { color:#64748b; }
    .input:focus { border-color:#10b981; background:rgba(16,185,129,.06); box-shadow:0 0 0 4px rgba(16,185,129,.14); }
    .field-wrap:focus-within svg.lead { color:#34d399; }

    .btn-login {
      width:100%; margin-top:6px; padding:13px 16px; font-size:14px; font-weight:700;
      color:#fff; border:none; border-radius:12px; cursor:pointer;
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 10px 26px -10px rgba(16,185,129,.7);
      transition: transform .14s ease, box-shadow .2s ease, filter .15s;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 16px 34px -12px rgba(16,185,129,.8); filter:brightness(1.04); }
    .btn-login:active { transform: scale(.985); }
    .btn-login:focus-visible { outline:2px solid #34d399; outline-offset:3px; }

    @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
  </style>
</head>
<body class="min-h-full login-bg flex items-center justify-center px-4 py-12 relative">
{% load static %}

  <div class="w-full max-w-sm relative" style="z-index:1">

    {# Logo + título #}
    <div class="text-center mb-7">
      <div class="inline-flex w-[72px] h-[72px] rounded-2xl items-center justify-center mb-5"
           style="background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); box-shadow:0 18px 40px -18px rgba(16,185,129,.5), inset 0 1px 0 rgba(255,255,255,.08);">
        <img src="{% static 'images/agi-logo.png' %}" alt="Agi Empréstimos"
             class="w-12 h-12 object-contain"
             style="filter: drop-shadow(0 0 10px rgba(16,185,129,.5));">
      </div>
      <h1 class="font-display text-2xl font-extrabold text-white tracking-tight">Agi Empréstimos</h1>
      <p class="text-slate-400 text-sm mt-2">Sistema de gestão de crédito</p>
    </div>

    {# Card de login #}
    <div class="glass-card rounded-2xl p-7">

      {% if form.errors %}
      <div class="flex items-start gap-3 text-sm rounded-xl px-4 py-3 mb-5"
           style="background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.35); color:#fca5a5;">
        <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span>Usuário ou senha incorretos. Tente novamente.</span>
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="field-label">Usuário</label>
          <div class="field-wrap">
            <svg class="lead" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <input type="text" name="username" autofocus required autocomplete="username"
                   class="input" placeholder="Seu usuário">
          </div>
        </div>

        <div>
          <label class="field-label">Senha</label>
          <div class="field-wrap">
            <svg class="lead" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" name="password" required autocomplete="current-password"
                   class="input" placeholder="••••••••">
          </div>
        </div>

        <input type="hidden" name="next" value="{{ next }}">

        <button type="submit" class="btn-login">
          Entrar no sistema
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </button>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      Agi Empréstimos &middot; Acesso restrito
    </p>
  </div>

</body>
</html>
