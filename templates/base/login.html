<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — Agi Empréstimos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .input {
      width: 100%; padding: 11px 14px; font-size: 14px; color: #1e293b;
      background: white; border: 1px solid #d1d5db; border-radius: 8px;
      outline: none; transition: border-color 150ms, box-shadow 150ms;
    }
    .input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgb(37 99 235 / .12); }
    .input::placeholder { color: #94a3b8; }
  </style>
</head>
<body class="min-h-full bg-slate-950 flex items-center justify-center px-4 py-12">
{% load static %}

  <div class="w-full max-w-sm">

    {# Logo + título #}
    <div class="text-center mb-8">
      <div class="inline-flex w-20 h-20 rounded-2xl bg-slate-900 border border-slate-800 items-center justify-center shadow-xl shadow-black/50 mb-5">
        <img src="{% static 'images/agi-logo.png' %}" alt="Agi Empréstimos"
             class="w-14 h-14 object-contain"
             style="filter: drop-shadow(0 0 8px rgba(34,197,94,.35));">
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Agi Empréstimos</h1>
      <p class="text-slate-500 text-sm mt-1.5">Sistema de gestão de crédito</p>
    </div>

    {# Card de login #}
    <div class="bg-white rounded-2xl p-7 shadow-2xl shadow-black/40">

      {% if form.errors %}
      <div class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-5">
        <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span>Usuário ou senha incorretos. Tente novamente.</span>
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Usuário</label>
          <input type="text" name="username" autofocus required autocomplete="username"
                 class="input" placeholder="Seu usuário">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Senha</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="input" placeholder="••••••••">
        </div>

        <input type="hidden" name="next" value="{{ next }}">

        <button type="submit"
                class="w-full mt-2 py-3 px-4 bg-blue-600 hover:bg-blue-700 active:scale-95
                       text-white font-semibold rounded-xl transition-all text-sm
                       shadow-md shadow-blue-900/30 focus:outline-none focus:ring-2
                       focus:ring-blue-500 focus:ring-offset-2">
          Entrar no sistema
        </button>
      </form>
    </div>

    <p class="text-center text-slate-700 text-xs mt-6">
      Agi Empréstimos &middot; Acesso restrito
    </p>
  </div>

</body>
</html>
